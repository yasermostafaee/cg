schema: spec-driven

context: |
  Broadcast CG platform — two browser React SPAs: Designer (visual editor that
  exports .vcg template packages) and Runtime (CasparCG playout controller).
  Monorepo: pnpm + Turborepo + strict TypeScript, built with Vite (migrated off
  Electron). The renderer talks to its backend ONLY through the typed window.cg
  bridge (DesignerBridge / RuntimeBridge); the in-browser implementation lives in
  apps/*/src/platform. Shared domain types are Zod schemas in @cg/shared-schema;
  the broadcast DOM renderer is @cg/template-runtime. Persian/RTL is a core
  requirement. Conventional commits; tests via vitest; lint via @cg/eslint-config
  tiers (renderer/browser code must not import Node built-ins or Electron).

