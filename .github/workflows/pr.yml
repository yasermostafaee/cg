name: PR

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Cancel in-progress runs of the same workflow on the same ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'

jobs:
  ci:
    name: Lint • Typecheck • Test • Build
    # Browser SPAs build + test cross-platform; no Electron means no Windows
    # requirement, so CI runs on Linux (faster + cheaper).
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up pnpm
        # Must come before setup-node so setup-node's pnpm cache works.
        # Version is read from package.json's `packageManager` field.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
