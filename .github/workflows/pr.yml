name: PR

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Cancel in-progress runs of the same workflow on the same ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'

jobs:
  ci:
    name: Lint • Typecheck • Test • Build
    # Browser SPAs build + test cross-platform; no Electron means no Windows
    # requirement, so CI runs on Linux (faster + cheaper).
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up pnpm
        # Must come before setup-node so setup-node's pnpm cache works.
        # Version is read from package.json's `packageManager` field.
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # E2E runs in its OWN job (P-005) so it never slows the fast unit gate above.
  # Required green. The Designer boots in test mode (window.CG_E2E → MemoryWorkspace,
  # no native dialogs); Playwright serves the built app via `vite preview`.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-e2e-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-e2e-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the Playwright browser download keyed on the installed version, so
      # Chromium isn't re-downloaded on every run.
      - name: Resolve Playwright version
        id: pw
        working-directory: apps/designer
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium (+ deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @cg/designer exec playwright install --with-deps chromium

      - name: Install system deps for cached browser
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @cg/designer exec playwright install-deps chromium

      - name: Build (workspace)
        run: pnpm build

      - name: E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/designer/playwright-report/
          retention-days: 7
